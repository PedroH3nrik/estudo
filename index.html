<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Questões - Simulador Policial Realista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0B1120; }
        ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2d5a8a; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-in { animation: slideIn 0.5s ease-out forwards; }

        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-strong { background: rgba(11, 17, 32, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }

        .option-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 2px solid transparent; }
        .option-card:hover { transform: translateX(8px); border-color: #3B82F6; background: rgba(59, 130, 246, 0.1); }
        .option-card.selected { border-color: #3B82F6 !important; background: rgba(59, 130, 246, 0.15) !important; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); }
        .option-card.correct { border-color: #10B981 !important; background: rgba(16, 185, 129, 0.15) !important; }
        .option-card.wrong { border-color: #EF4444 !important; background: rgba(239, 68, 68, 0.15) !important; }

        .page-transition { transition: opacity 0.4s ease, transform 0.4s ease; }
        .page-hidden { opacity: 0; pointer-events: none; transform: scale(0.95); position: absolute; width: 100%; top: 0; display: none; }
        .page-active { opacity: 1; pointer-events: all; transform: scale(1); position: relative; display: block; }

        .career-btn.active { border-color: #3B82F6 !important; background: rgba(59, 130, 246, 0.15) !important; }
        .career-btn.active .check-indicator div { opacity: 1 !important; }
        
        .qgrid-btn { width: 100%; aspect-ratio: 1; border-radius: 6px; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #334155; background: #1e293b; }
        .qgrid-btn.answered { background: #3B82F6; color: white; border-color: #3B82F6; }
        .qgrid-btn.current { border-color: #3B82F6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-[#0B1120] text-[#F1F5F9] min-h-screen">

    <nav class="fixed top-0 w-full z-50 glass-strong border-b border-slate-800/50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white">Δ</div>
                <div>
                    <h1 class="text-lg font-bold text-white">Delta Questões</h1>
                    <p class="text-xs text-slate-400">Simulador de Elite</p>
                </div>
            </div>
            <div id="simTimerNav" class="hidden font-mono text-blue-400 font-bold bg-slate-800/50 px-4 py-1.5 rounded-full border border-slate-700">00:00:00</div>
        </div>
    </nav>

    <main class="pt-24 pb-12 px-4 max-w-7xl mx-auto">
        <!-- CONFIG PAGE -->
        <div id="page-config" class="page-transition page-active space-y-8">
            <div class="text-center">
                <h2 class="text-3xl font-extrabold text-white">Configure seu Simulado Realista</h2>
            </div>
            
            <div class="glass rounded-2xl p-6">
                <h3 class="mb-4 font-semibold text-blue-400">1. Selecione a Carreira</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button onclick="selectCareer('pmba')" class="career-btn p-4 rounded-xl border-2 border-slate-700 bg-slate-800/50 text-left relative" id="btn-pmba">
                        <div class="text-xl">🚔</div>
                        <div class="font-bold">PMBA</div>
                        <div class="text-xs text-slate-400">FCC - 80 Qs</div>
                        <div class="check-indicator absolute top-2 right-2 w-4 h-4 border border-slate-600 rounded-full flex items-center justify-center"><div class="w-2 h-2 bg-blue-500 rounded-full opacity-0"></div></div>
                    </button>
                    <button onclick="selectCareer('prf')" class="career-btn p-4 rounded-xl border-2 border-slate-700 bg-slate-800/50 text-left relative" id="btn-prf">
                        <div class="text-xl">🛣️</div>
                        <div class="font-bold">PRF</div>
                        <div class="text-xs text-slate-400">Cebraspe - 120 Qs</div>
                    </button>
                </div>
            </div>

            <button onclick="startSim()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-lg shadow-lg transition-all">Iniciar Treinamento</button>
        </div>

        <!-- SIMULATION PAGE -->
        <div id="page-sim" class="page-transition page-hidden">
            <div class="grid lg:grid-cols-4 gap-6">
                <div class="lg:col-span-3 space-y-6">
                    <div class="glass rounded-2xl p-6">
                        <div class="flex justify-between mb-6">
                            <span id="qSubject" class="text-blue-400 font-bold uppercase text-xs tracking-widest">Disciplina</span>
                            <span id="qIndex" class="font-mono text-slate-400">Questão 1/80</span>
                        </div>
                        <div id="questionText" class="text-lg text-white leading-relaxed mb-8">Carregando questão...</div>
                        <div id="optionsContainer" class="space-y-3">
                            <!-- Opções aparecem aqui -->
                        </div>
                        <div class="flex justify-between mt-8 pt-6 border-t border-slate-800">
                            <button onclick="changeQ(-1)" class="text-slate-400 hover:text-white">Anterior</button>
                            <button onclick="confirmAnswer()" class="bg-blue-600 px-8 py-2 rounded-lg font-bold">Confirmar Resposta</button>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-1">
                    <div class="glass rounded-2xl p-4 sticky top-24">
                        <h4 class="text-xs font-bold text-slate-500 mb-3 uppercase">Mapa de Questões</h4>
                        <div id="questionGrid" class="grid grid-cols-5 gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const db = [
            { id: 1, sub: "Direito Constitucional", txt: "A respeito dos direitos fundamentais na CF/88, é correto afirmar que:", opts: ["A propriedade atenderá a função social", "O direito à vida é apenas biológico", "Ninguém pode ser preso em flagrante", "A casa é asilo inviolável apenas de dia", "O voto é facultativo para analfabetos"], ans: 0 },
            { id: 2, sub: "Direito Penal", txt: "O crime de peculato-furto ocorre quando o funcionário público:", opts: ["Subtrai o bem valendo-se da facilidade do cargo", "Apropria-se de valor que tem a posse", "Exige vantagem indevida", "Solicita propina", "Retarda ato de ofício"], ans: 0 }
        ];

        let state = {
            career: 'pmba',
            current: 0,
            answers: {}, // {index: selectedOptionIndex}
            finished: false
        };

        function switchPage(id) {
            document.querySelectorAll('.page-transition').forEach(p => {
                p.classList.remove('page-active');
                p.classList.add('page-hidden');
            });
            const active = document.getElementById(id);
            active.classList.remove('page-hidden');
            active.classList.add('page-active');
        }

        function selectCareer(c) {
            state.career = c;
            document.querySelectorAll('.career-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + c).classList.add('active');
        }

        function startSim() {
            switchPage('page-sim');
            document.getElementById('simTimerNav').classList.remove('hidden');
            renderGrid();
            loadQuestion();
        }

        function renderGrid() {
            const grid = document.getElementById('questionGrid');
            grid.innerHTML = db.map((_, i) => `
                <div onclick="jumpTo(${i})" class="qgrid-btn ${state.answers[i] !== undefined ? 'answered' : ''} ${state.current === i ? 'current' : ''}">
                    ${i + 1}
                </div>
            `).join('');
        }

        function loadQuestion() {
            const q = db[state.current];
            document.getElementById('qSubject').innerText = q.sub;
            document.getElementById('qIndex').innerText = `Questão ${state.current + 1}/${db.length}`;
            document.getElementById('questionText').innerText = q.txt;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = q.opts.map((opt, i) => `
                <div onclick="selectOption(${i})" class="option-card p-4 rounded-xl bg-slate-800/40 border-2 ${state.answers[state.current] === i ? 'selected' : 'border-transparent'}" id="opt-${i}">
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 rounded-lg bg-slate-700 flex items-center justify-center text-xs font-bold">${String.fromCharCode(65 + i)}</span>
                        <span class="text-slate-200">${opt}</span>
                    </div>
                </div>
            `).join('');
            renderGrid();
        }

        function selectOption(index) {
            // Remove seleção visual de todos
            document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
            // Adiciona ao selecionado
            document.getElementById('opt-' + index).classList.add('selected');
            // Salva no estado
            state.answers[state.current] = index;
        }

        function confirmAnswer() {
            if (state.answers[state.current] === undefined) {
                alert("Selecione uma opção primeiro!");
                return;
            }
            if (state.current < db.length - 1) {
                state.current++;
                loadQuestion();
            } else {
                alert("Simulado finalizado! (Lógica de resultado pode ser adicionada aqui)");
            }
        }

        function jumpTo(i) {
            state.current = i;
            loadQuestion();
        }

        function changeQ(dir) {
            let next = state.current + dir;
            if (next >= 0 && next < db.length) {
                state.current = next;
                loadQuestion();
            }
        }

        // Inicializa com PMBA selecionada
        selectCareer('pmba');
    </script>
</body>
</html>
