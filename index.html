<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulador PMBA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
button{padding:10px;margin:5px;border:none;border-radius:5px;cursor:pointer}
.opcao{padding:10px;border:1px solid #ccc;margin:5px 0;cursor:pointer}
</style>

</head>
<body>

<h1>Simulador PMBA</h1>

<div id="menu">
<button onclick="iniciarProvaReal()">Iniciar Prova</button>
<button onclick="iniciarRevisao()">Revisar Erros</button>
</div>

<h2 id="timer"></h2>

<div id="quiz">
<h3 id="pergunta"></h3>
<div id="opcoes"></div>

<button onclick="voltar()">⬅ Voltar</button>
<button onclick="proxima()">➡ Próxima</button>
<button onclick="marcarQuestao()">📌 Marcar</button>
<button onclick="confirmar()">✔ Confirmar</button>
</div>

<script>

// ================= ESTADO =================
let state={prova:[],respostas:{},atual:0};
let desempenho=JSON.parse(localStorage.getItem("desempenho"))||{};
let bancoErros=JSON.parse(localStorage.getItem("bancoErros"))||[];
let marcadas=[];
let tempoProva=0;
let timerInterval;

// ================= EDITAL =================
const EDITAL={
disciplinas:[
{nome:"Português",peso:10,topicos:["interpretação","crase"]},
{nome:"Matemática",peso:8,topicos:["porcentagem"]},
{nome:"Direito Penal",peso:5,topicos:["crime"]},
{nome:"Constitucional",peso:5,topicos:["art 5"]}
]
};

// ================= DIFICULDADE =================
function nivel(m){
let d=desempenho[m]||{acertos:0,erros:0};
let t=d.acertos+d.erros;
let taxa=t?d.acertos/t*100:50;
if(taxa<60)return "FACIL";
if(taxa<75)return "MEDIO";
return "DIFICIL";
}

// ================= QUESTÃO =================
function gerarQuestao(m,top){

let n=nivel(m);

return{
materia:m,
topico:top,
nivel:n,
pergunta:n==="DIFICIL"?
`Texto longo sobre ${top}. Assinale a correta.`:
`Sobre ${top}, marque a correta.`,
alternativas:[
"Correta",
"Errada 1",
"Errada 2",
"Errada 3",
"Errada 4"
],
correta:0
};

}

// ================= GERAR PROVA =================
function gerarProva(){

let prova=[];

EDITAL.disciplinas.forEach(d=>{
for(let i=0;i<d.peso;i++){
let top=d.topicos[Math.floor(Math.random()*d.topicos.length)];
prova.push(gerarQuestao(d.nome,top));
}
});

state.prova=prova.sort(()=>Math.random()-0.5);
state.respostas={};
state.atual=0;

carregarQuestao();

}

// ================= RENDER =================
function carregarQuestao(){

let q=state.prova[state.atual];

document.getElementById("pergunta").innerText=
`${q.pergunta} (${q.materia} - ${q.nivel})`;

let op=document.getElementById("opcoes");
op.innerHTML="";

q.alternativas.forEach((a,i)=>{
let d=document.createElement("div");
d.className="opcao";
d.innerText=a;
d.onclick=()=>state.respostas[state.atual]=i;
op.appendChild(d);
});

}

// ================= NAV =================
function proxima(){
if(state.atual<state.prova.length-1){
state.atual++;
carregarQuestao();
}
}

function voltar(){
if(state.atual>0){
state.atual--;
carregarQuestao();
}
}

// ================= MARCAR =================
function marcarQuestao(){
if(!marcadas.includes(state.atual)){
marcadas.push(state.atual);
alert("Marcada!");
}
}

// ================= CONFIRMAR =================
function confirmar(){

let q=state.prova[state.atual];
let r=state.respostas[state.atual];

if(!desempenho[q.materia]) desempenho[q.materia]={acertos:0,erros:0};

if(r==q.correta){
desempenho[q.materia].acertos++;
}else{
desempenho[q.materia].erros++;
bancoErros.push(q);
}

localStorage.setItem("desempenho",JSON.stringify(desempenho));
localStorage.setItem("bancoErros",JSON.stringify(bancoErros));

proxima();

}

// ================= FINAL =================
function finalizar(){

clearInterval(timerInterval);

let acertos=0;
let resumo={};
let erros=[];

state.prova.forEach((q,i)=>{

let ok=state.respostas[i]==q.correta;

if(ok) acertos++;
else erros.push(q);

if(!resumo[q.materia]) resumo[q.materia]={a:0,t:0};

resumo[q.materia].t++;
if(ok) resumo[q.materia].a++;

});

let html=`<h2>Resultado</h2>
<p>${acertos}/${state.prova.length}</p>
<hr><h3>Por matéria</h3>`;

for(let m in resumo){
let r=resumo[m];
let tx=(r.a/r.t*100).toFixed(1);
html+=`<p>${m}: ${tx}%</p>`;
}

html+=`<hr><h3>Erros</h3>`;
erros.forEach(q=>{
html+=`<p>${q.materia} - ${q.topico}</p>`;
});

html+=`<button onclick="iniciarRevisao()">Revisar erros</button>`;

document.body.innerHTML=html;

}

// ================= REVISÃO =================
function iniciarRevisao(){

if(bancoErros.length==0){
alert("Sem erros!");
return;
}

state.prova=bancoErros.sort(()=>Math.random()-0.5);
state.respostas={};
state.atual=0;

carregarQuestao();

}

// ================= TIMER =================
function iniciarTimer(){

tempoProva=4*60*60;

timerInterval=setInterval(()=>{

tempoProva--;

let h=Math.floor(tempoProva/3600);
let m=Math.floor((tempoProva%3600)/60);
let s=tempoProva%60;

document.getElementById("timer").innerText=
`${h}:${m}:${s}`;

if(tempoProva<=0){
finalizar();
}

},1000);

}

// ================= START =================
function iniciarProvaReal(){
marcadas=[];
gerarProva();
iniciarTimer();
}

</script>

</body>
</html>
