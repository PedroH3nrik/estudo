<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulador</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:#fff;
    padding:20px;
}

h1{
    text-align:center;
}

#container{
    max-width:700px;
    margin:auto;
}

.option-card{
    padding:12px;
    border:1px solid #555;
    margin:8px 0;
    cursor:pointer;
    border-radius:6px;
}

.option-card:hover{
    background:#1e293b;
}

.selected{
    background:#2563eb;
    color:white;
}

button{
    padding:10px;
    margin-top:10px;
    cursor:pointer;
    border:none;
    border-radius:5px;
}
</style>

</head>
<body>

<div id="container">

<h1>Simulador</h1>

<div id="quiz">
    <h3 id="pergunta"></h3>
    <div id="options"></div>

    <button onclick="confirmar()">Confirmar</button>
</div>

<div id="resultado" style="display:none;"></div>

</div>

<script>

// ================= ESTADO =================
let state = {
    perguntas: [],
    respostas: {},
    atual: 0
};

// ================= QUESTÕES TESTE =================
state.perguntas = [
    {
        pergunta: "Qual é a correta?",
        opcoes: ["Certa", "Errada 1", "Errada 2", "Errada 3"],
        correta: 0
    },
    {
        pergunta: "2 + 2 = ?",
        opcoes: ["3", "4", "5", "6"],
        correta: 1
    }
];

// ================= CARREGAR QUESTÃO =================
function carregarQuestao(){

    let q = state.perguntas[state.atual];

    document.getElementById("pergunta").innerText = q.pergunta;

    let container = document.getElementById("options");
    container.innerHTML = "";

    q.opcoes.forEach((opt, i)=>{

        let div = document.createElement("div");
        div.className = "option-card";
        div.innerText = opt;

        // clique para selecionar
        div.onclick = () => {

            // remove seleção anterior
            document.querySelectorAll(".option-card").forEach(el=>{
                el.classList.remove("selected");
            });

            // adiciona seleção
            div.classList.add("selected");

            // salva resposta
            state.respostas[state.atual] = i;
        };

        container.appendChild(div);

    });

}

// ================= CONFIRMAR =================
function confirmar(){

    if(state.respostas[state.atual] === undefined){
        alert("Selecione uma opção!");
        return;
    }

    state.atual++;

    if(state.atual < state.perguntas.length){
        carregarQuestao();
    } else {
        finalizar();
    }

}

// ================= FINAL =================
function finalizar(){

    let acertos = 0;

    state.perguntas.forEach((q,i)=>{
        if(state.respostas[i] == q.correta){
            acertos++;
        }
    });

    document.getElementById("quiz").style.display="none";

    let res = document.getElementById("resultado");
    res.style.display="block";

    res.innerHTML = `
        <h2>Resultado</h2>
        <p>${acertos} / ${state.perguntas.length}</p>
    `;

}

// ================= INICIAR =================
carregarQuestao();

</script>

</body>
</html>
